{% if user.is_authenticated %}
  <a href="{% url 'taxi:driver-detail' user.id %}">{{ user.username }}</a>
  <form action="{% url 'logout' %}" method="post">
    {% csrf_token %}
    <button type="submit">Logout</button>
  </form>
{% else %}
  <a href="{% url 'login' %}">login</a>
{% endif %}
